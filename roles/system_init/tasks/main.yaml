---
- name: Ensure secure-network exists
  community.docker.docker_network:
    name: secure-network
    state: present

- name: Get mount points information
  ansible.builtin.setup:
    gather_subset:
      - mounts
      - devices

- name: Identify root disk from mounts
  ansible.builtin.set_fact:
    root_disk: "{{ item.device | regex_search('(sd[a-z]|nvme[0-9]n[0-9]|vd[a-z])') }}"
  loop: "{{ ansible_mounts }}"
  when: item.mount == "/" and (item.device | regex_search('(sd[a-z]|nvme[0-9]n[0-9]|vd[a-z])') is not none)

- name: Find secondary data disk from available block devices
  ansible.builtin.set_fact:
    target_disk: >-
      {% set found = namespace(disk='') %}
      {% for device in ansible_facts.devices.keys() %}
        {% if device is match('^sd[a-z]$|^nvme[0-9]n[0-9]$|^vd[a-z]$') and device != root_disk %}
          {% set found.disk = device %}
        {% endif %}
      {% endfor %}
      {{ found.disk | trim }}

- name: Fail if no secondary storage disk is found
  ansible.builtin.fail:
    msg: "Could not automatically detect a secondary data disk that is not the OS disk (Root disk detected as: /dev/{{ root_disk }})."
  when: target_disk == ""

- name: Create mount directory for custom storage
  ansible.builtin.file:
    path: /mnt/storage
    state: directory
    mode: '0755'

- name: Create filesystem on secondary disk if it does not exist
  community.general.filesystem:
    fstype: ext4
    dev: "/dev/{{ target_disk }}"

- name: Mount and configure secondary data disk
  ansible.posix.mount:
    path: /mnt/storage
    src: "/dev/{{ target_disk }}"
    fstype: ext4
    opts: defaults,noatime
    state: mounted

- name: Configure sysctl parameters for high load and database stability
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { key: 'vm.overcommit_memory', value: '1' }
    - { key: 'vm.max_map_count', value: '262144' }
    - { key: 'fs.file-max', value: '2097152' }

- name: Check if swap file exists
  ansible.builtin.stat:
    path: /swapfile
  register: swap_file_check

- name: Create swap file if it does not exist
  block:
    - name: Allocate space for swapfile
      ansible.builtin.command: fallocate -l 4G /swapfile
      changed_when: true

    - name: Set correct permissions for swapfile
      ansible.builtin.file:
        path: /swapfile
        mode: '0600'

    - name: Make swapfile
      ansible.builtin.command: mkswap /swapfile
      changed_when: true

    - name: Enable swapfile
      ansible.builtin.command: swapon /swapfile
      changed_when: true

    - name: Add swapfile to fstab
      ansible.builtin.mount:
        path: none
        src: /swapfile
        fstype: swap
        opts: sw
        state: present
  when: not swap_file_check.stat.exists
