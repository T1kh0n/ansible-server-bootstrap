---
- name: Ensure DB data directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/infra/postgres/data
    - /opt/infra/redis/data

- name: Deploy Data Layers Stack
  community.docker.docker_compose_v2:
    project_name: data_layers
    definition:
      services:
        postgres:
          image: postgres:16-alpine
          environment:
            POSTGRES_USER: "{{ db_user | default('portfolio_user') }}"
            POSTGRES_PASSWORD: "{{ db_password | default('secure_db_pass') }}"
            POSTGRES_DB: "{{ db_name | default('portfolio') }}"
          volumes:
            - /opt/infra/postgres/data:/var/lib/postgresql/data
          deploy:
            resources:
              limits:
                memory: 256M
          networks:
            - secure-network
        redis:
          image: redis:7-alpine
          command: redis-server --appendonly yes
          volumes:
            - /opt/infra/redis/data:/data
          deploy:
            resources:
              limits:
                memory: 128M
          networks:
            - secure-network
      networks:
        secure-network:
          external: true

- name: Wait for PostgreSQL to be ready
  community.docker.docker_container_exec:
    container: data_layers-postgres-1
    command: pg_isready -U {{ db_user | default('portfolio_user') }} -d {{ db_name | default('portfolio') }}
  register: pg_check
  until: pg_check.rc == 0
  retries: 10
  delay: 3

- name: Force update Grafana admin password in PostgreSQL
  community.docker.docker_container_exec:
    container: data_layers-postgres-1
    command: >
      psql -U {{ db_user | default('portfolio_user') }} -d {{ db_name | default('portfolio') }} -c
      "UPDATE usr SET password = '{{ grafana_admin_password | default('admin_secure_pass') | ansible.builtin.password_hash('blowfish') }}' WHERE login = 'admin';"
  failed_when: false
