---
- name: Ensure monitoring directories exist (root owned)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/infra/victoriametrics/data
    - /opt/infra/vmagent/config
    - /opt/infra/grafana/provisioning/datasources
    - /opt/infra/grafana/provisioning/dashboards
    - /opt/infra/grafana/dashboards

- name: Ensure Grafana data directory exists with correct permissions
  ansible.builtin.file:
    path: /opt/infra/grafana/data
    state: directory
    owner: '472'
    group: '0'
    mode: '0755'

- name: Template vmagent configuration
  ansible.builtin.template:
    src: vmagent.yaml.j2
    dest: /opt/infra/vmagent/config/vmagent.yaml

- name: Setup Grafana provisioning datasources
  ansible.builtin.copy:
    dest: /opt/infra/grafana/provisioning/datasources/datasource.yaml
    content: |
      apiVersion: 1
      datasources:
        - name: VictoriaMetrics
          type: prometheus
          access: proxy
          url: http://vmsingle:8428
          isDefault: true
          editable: false
    mode: '0644'

- name: Setup Grafana provisioning dashboards config
  ansible.builtin.copy:
    dest: /opt/infra/grafana/provisioning/dashboards/dashboard.yaml
    content: |
      apiVersion: 1
      providers:
        - name: 'Default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          updateIntervalSeconds: 10
          options:
            path: /etc/grafana/dashboards
    mode: '0644'

- name: Get latest revision of VictoriaMetrics dashboard
  ansible.builtin.uri:
    url: https://grafana.com/api/dashboards/11176/revisions
    return_content: true
  register: vm_revisions

- name: Download VictoriaMetrics dashboard
  ansible.builtin.get_url:
    url: "https://grafana.com/api/dashboards/11176/revisions/{{ vm_revisions.json.items[0].revision }}/download"
    dest: /opt/infra/grafana/dashboards/victoriametrics.json
    mode: '0644'

- name: Get latest revision of Traefik dashboard
  ansible.builtin.uri:
    url: https://grafana.com/api/dashboards/11462/revisions
    return_content: true
  register: traefik_revisions

- name: Download Traefik dashboard
  ansible.builtin.get_url:
    url: "https://grafana.com/api/dashboards/11462/revisions/{{ traefik_revisions.json.items[0].revision }}/download"
    dest: /opt/infra/grafana/dashboards/traefik.json
    mode: '0644'

- name: Deploy Monitoring Stack
  community.docker.docker_compose_v2:
    project_name: monitoring
    definition:
      services:
        vmsingle:
          image: victoriametrics/victoria-metrics:v1.101.0
          command:
            - "--storageDataPath=/victoria-metrics-data"
            - "--retentionPeriod=1"
          volumes:
            - /opt/infra/victoriametrics/data:/victoria-metrics-data
          ports:
            - "127.0.0.1:8428:8428"
          deploy:
            resources:
              limits:
                memory: 64M
          networks:
            - secure-network
        vmagent:
          image: victoriametrics/vmagent:v1.101.0
          command:
            - "--promscrape.config=/config/vmagent.yaml"
            - "--remoteWrite.url=http://vmsingle:8428/api/v1/write"
          volumes:
            - /opt/infra/vmagent/config/vmagent.yaml:/config/vmagent.yaml
          ports:
            - "127.0.0.1:8429:8429"
          deploy:
            resources:
              limits:
                memory: 32M
          networks:
            - secure-network
        grafana:
          image: grafana/grafana-oss:latest
          environment:
            GF_SECURITY_ADMIN_USER: "admin"
            GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password | default('admin_secure_pass') }}"
            GF_DATABASE_TYPE: "postgres"
            GF_DATABASE_HOST: "postgres:5432"
            GF_DATABASE_NAME: "{{ db_name | default('portfolio') }}"
            GF_DATABASE_USER: "{{ db_user | default('portfolio_user') }}"
            GF_DATABASE_PASSWORD: "{{ db_password | default('secure_db_pass') }}"
            GF_DATABASE_SSL_MODE: "disable"
          volumes:
            - /opt/infra/grafana/data:/var/lib/grafana
            - /opt/infra/grafana/provisioning:/etc/grafana/provisioning
            - /opt/infra/grafana/dashboards:/etc/grafana/dashboards
          ports:
            - "127.0.0.1:3000:3000"
          deploy:
            resources:
              limits:
                memory: 512M
          networks:
            - secure-network
      networks:
        secure-network:
          external: true
