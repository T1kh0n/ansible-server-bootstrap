---
- name: Ensure monitoring directories exist (root owned)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/infra/victoriametrics/data
    - /opt/infra/vmagent/config

- name: Ensure Grafana data directory exists with correct permissions
  ansible.builtin.file:
    path: /opt/infra/grafana/data
    state: directory
    owner: '472'
    group: '0'
    mode: '0755'

- name: Template vmagent configuration
  ansible.builtin.template:
    src: vmagent.yaml.j2
    dest: /opt/infra/vmagent/config/vmagent.yaml

- name: Deploy Monitoring Stack
  community.docker.docker_compose_v2:
    project_name: monitoring
    definition:
      services:
        vmsingle:
          image: victoriametrics/victoria-metrics:v1.101.0
          command:
            - "--storageDataPath=/victoria-metrics-data"
            - "--retentionPeriod=1"
          volumes:
            - /opt/infra/victoriametrics/data:/victoria-metrics-data
          deploy:
            resources:
              limits:
                memory: 64M
          networks:
            - secure-network
        vmagent:
          image: victoriametrics/vmagent:v1.101.0
          command:
            - "--promscrape.config=/config/vmagent.yaml"
            - "--remoteWrite.url=http://vmsingle:8428/api/v1/write"
          volumes:
            - /opt/infra/vmagent/config/vmagent.yaml:/config/vmagent.yaml
          deploy:
            resources:
              limits:
                memory: 32M
          networks:
            - secure-network
        grafana:
          image: grafana/grafana-oss:latest
          environment:
            GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password | default('admin_secure_pass') }}"
            GF_USERS_ALLOW_SIGN_UP: "false"
            GF_DATABASE_TYPE: "postgres"
            GF_DATABASE_HOST: "postgres:5432"
            GF_DATABASE_NAME: "{{ db_name | default('portfolio') }}"
            GF_DATABASE_USER: "{{ db_user | default('portfolio_user') }}"
            GF_DATABASE_PASSWORD: "{{ db_password | default('secure_db_pass') }}"
            GF_DATABASE_SSL_MODE: "disable"
          volumes:
            - /opt/infra/grafana/data:/var/lib/grafana
          deploy:
            resources:
              limits:
                memory: 128M
          networks:
            - secure-network
      networks:
        secure-network:
          external: true
