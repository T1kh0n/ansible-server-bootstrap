---
- name: Ensure secure-network exists
  community.docker.docker_network:
    name: secure-network
    state: present

- name: Ensure infrastructure directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/infra/traefik/config
    - /opt/infra/traefik/letsencrypt
    - /opt/infra/traefik/dynamic
    - /opt/infra/crowdsec/data
    - /opt/infra/crowdsec/config

- name: Ensure Traefik acme.json exists with correct permissions
  ansible.builtin.file:
    path: /opt/infra/traefik/letsencrypt/acme.json
    state: touch
    mode: '0600'
    modification_time: preserve
    access_time: preserve

- name: Template Traefik configuration
  ansible.builtin.template:
    src: traefik.yaml.j2
    dest: /opt/infra/traefik/config/traefik.yaml

- name: Deploy Core Infrastructure
  community.docker.docker_compose_v2:
    project_name: infra_core
    definition:
      services:
        traefik:
          image: traefik:v3.0
          ports:
            - "80:80"
            - "443:443"
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /opt/infra/traefik/config/traefik.yaml:/etc/traefik/traefik.yaml:ro
            - /opt/infra/traefik/letsencrypt:/letsencrypt
          networks:
            - secure-network
          labels:
            - "traefik.http.middlewares.crowdsec-waf.plugin.bouncer.enabled=true"
        crowdsec:
          image: crowdsecurity/crowdsec:latest
          environment:
            COLLECTIONS: "crowdsecurity/traefik"
          volumes:
            - /var/log:/var/log:ro
            - /opt/infra/crowdsec/data:/var/lib/crowdsec/data
            - /opt/infra/crowdsec/config:/etc/crowdsec
          networks:
            - secure-network
        oxker:
          image: ghcr.io/mrjackwills/oxker
          tty: true
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
          networks:
            - secure-network
      networks:
        secure-network:
          external: true
