---
# Публичный SSH-ключ вашего рабочего компьютера/ноутбука.
# Ansible добавит его пользователю 'main', чтобы вы могли входить без пароля.
ssh_public_keys:
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK..." 

# Разрешить ли временный вход по паролю для первоначальной настройки 
# (после успешного наката роли system_init доступ по паролю полностью отключится)
enable_ssh_password: true
