---
- name: Homelab Bootstrap (Static IP Setup)
  hosts: homelab
  become: true
  gather_facts: true
  vars_files:
    - vars/hardening.yaml

  tasks:
    - name: Install base packages
      ansible.builtin.include_role:
        name: base_packages

    - name: Setup firewalld
      ansible.builtin.include_role:
        name: firewall

    - name: System Initialization and Hardening
      ansible.builtin.include_role:
        name: system_init

    - name: Install Docker, Compose and Ansible library
      ansible.builtin.apt:
        name: 
          - docker.io
          - docker-compose
          - python3-docker
        state: present
        update_cache: true

    - name: Ensure Docker service is running and enabled
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Add current deployment user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: true

    - name: Setup Core Infrastructure
      ansible.builtin.include_role:
        name: infra_core

    - name: Display Generated Passwords
      ansible.builtin.debug:
        msg: |
          =============================================
          SYSTEM PASSWORDS GENERATED FOR HOME SERVER
          =============================================
          User: root | Pass: {{ hostvars[inventory_hostname]['root_password'] | default('NOT SET', true) }}
          User: main | Pass: {{ hostvars[inventory_hostname]['main_password'] | default('NOT SET', true) }}
          User: sudo | Pass: {{ hostvars[inventory_hostname]['sudo_password'] | default('NOT SET', true) }}
          =============================================

- name: Homelab specific actions
  hosts: homelab
  become: true
  roles:
    - homelab
